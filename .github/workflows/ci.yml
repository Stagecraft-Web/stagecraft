name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  monorepo:
    name: Monorepo (apps + packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test

      - run: npm run build

  musician-site-legacy:
    name: Template (musician-site-legacy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/musician-site-legacy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/musician-site-legacy/package-lock.json

      - run: npm ci

      - run: npm run validate:content

      - run: npm run check:markdoc-config

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build

  musician-site:
    name: Template (musician-site)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/musician-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/musician-site/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test

      - run: npm run build
