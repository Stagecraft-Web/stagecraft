name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  monorepo:
    name: Monorepo (apps + packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test

      - run: npm run build

  musician-site-legacy:
    name: Template (musician-site-legacy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/musician-site-legacy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/musician-site-legacy/package-lock.json

      - run: npm ci

      - run: npm run validate:content

      - run: npm run check:markdoc-config

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build

  musician-site:
    name: Template (musician-site)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/musician-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/musician-site/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test

      - run: npm run build

  # Apply any pending Prisma migrations to the production Neon DB after
  # a PR merges to main. Runs only on push-to-main (not on PRs, where the
  # new migration always shows pending and would force a manual step).
  #
  # Why apply, not verify: a merged PR with a migration triggers two
  # parallel deploys — this job, and Netlify's build. If we only verified
  # here, prod would throw P2022 on the new column until someone ran
  # `npm run db:migrate:prod` locally. `migrate deploy` is idempotent —
  # a no-op when there's nothing pending — so it's safe to run every push.
  #
  # Race window: Netlify's build (~90s) is much slower than this job
  # (~10s with cached node_modules), so the migration usually lands well
  # before the new code goes live. Not bulletproof — for stricter
  # ordering, run the migration as part of the Netlify build itself.
  #
  # Skipped when the PRODUCTION_DATABASE_URL secret is unset (e.g. on forks).
  db-migrations-applied:
    name: DB migrations applied to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - name: Apply pending migrations to production
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        working-directory: packages/db
        run: |
          if [ -z "$PRODUCTION_DATABASE_URL" ]; then
            echo "::warning::PRODUCTION_DATABASE_URL secret not set; skipping migration apply."
            exit 0
          fi
          # Idempotent: no-op when no pending migrations.
          DATABASE_URL="$PRODUCTION_DATABASE_URL" npx prisma migrate deploy
