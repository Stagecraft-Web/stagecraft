services:
  postgres:
    image: postgres:17
    container_name: stagecraft-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: stagecraft
      POSTGRES_PASSWORD: stagecraft
      POSTGRES_DB: stagecraft
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
